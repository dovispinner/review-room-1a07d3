<style>
:root{--paper:#f4f1ea;--ink:#1a1f2b;--line:#d9d2c4;--accent:#8a6d3b}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.card{width:100%;max-width:400px;background:#fffdf8;border:1px solid var(--line);border-radius:14px;padding:34px 30px;box-shadow:0 10px 40px rgba(26,31,43,.08)}
.mark{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}

p.sub{margin:0 0 22px;color:#6b6456;font-size:13.5px;line-height:1.5}
label{display:block;font-size:12px;color:#6b6456;margin-bottom:7px;letter-spacing:.04em}
input{width:100%;padding:12px 14px;font-size:16px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);outline:none}
input:focus{border-color:var(--accent)}
button{margin-top:16px;width:100%;padding:12px;font-size:15px;font-weight:600;color:#fffdf8;background:var(--ink);border:none;border-radius:9px;cursor:pointer;letter-spacing:.02em}
button:disabled{opacity:.5;cursor:default}
.err{color:#a8324a;font-size:13px;margin-top:12px;min-height:18px}
.foot{margin-top:20px;font-size:11px;color:#9a9280;text-align:center;letter-spacing:.03em}
</style></head><body>

async function unlock(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2a(P.salt),iterations:P.iter,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
